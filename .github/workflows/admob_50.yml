name: AdMob Sync - Account 3

on:
  schedule:
    - cron: '30 6 * * *'    # 06:30 UTC daily (after Account 1 at 06:00 and Account 2 at 06:15)
  workflow_dispatch:
    inputs:
      days_back:
        description: 'Days to sync (default: 3)'
        required: false
        default: '3'
      backfill_start:
        description: 'Backfill start date (YYYY-MM-DD)'
        required: false
      backfill_end:
        description: 'Backfill end date (YYYY-MM-DD)'
        required: false

concurrency:
  group: admob-sync-account-3
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install google-api-python-client google-auth google-auth-oauthlib google-cloud-bigquery
          fi

      - name: Run AdMob Sync - Account 3
        env:
          GCP_PROJECT_ID:        ${{ secrets.GCP_PROJECT_ID }}
          GCP_CREDENTIALS_JSON:  ${{ secrets.GCP_CREDENTIALS_JSON }}
          BQ_DATASET_ID:         ${{ secrets.BQ_DATASET_ID }}
          BQ_LOCATION:           ${{ secrets.BQ_LOCATION }}
          ADMOB_REPORT_CURRENCY: ${{ secrets.ADMOB_REPORT_CURRENCY }}
          ADMOB_PUBLISHER_ID:    ${{ secrets.ADMOB_PUBLISHER_ID_ACCOUNT3 }}
          OAUTH_CLIENT_ID:       ${{ secrets.OAUTH_CLIENT_ID_ACCOUNT3 }}
          OAUTH_CLIENT_SECRET:   ${{ secrets.OAUTH_CLIENT_SECRET_ACCOUNT3 }}
          OAUTH_REFRESH_TOKEN:   ${{ secrets.OAUTH_REFRESH_TOKEN_ACCOUNT3 }}
        run: |
          if [ -n "${{ github.event.inputs.backfill_start }}" ] && [ -n "${{ github.event.inputs.backfill_end }}" ]; then
            python src/admob_python.py \
              --backfill-start "${{ github.event.inputs.backfill_start }}" \
              --backfill-end "${{ github.event.inputs.backfill_end }}"
          else
            python src/admob_python.py \
              --days "${{ github.event.inputs.days_back || '3' }}"
          fi
